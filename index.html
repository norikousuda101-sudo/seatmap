<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>座席表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1814;--ink2:#6b6460;--bg:#f4f1ec;--surf:#fdfcfa;
  --bdr:#ddd8d0;--blue:#1e4fc2;--blue-bg:#edf2fc;
  --grn:#16703f;--grn-bg:#e6f5ee;--red:#b82010;--red-bg:#fdecea;
  --amber:#92400e;--amber-bg:#fef3e2;--edit-bdr:#fcd34d;--edit-accent:#d97706;
  --r:7px;--font:'Noto Sans JP',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);
     height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hd{background:var(--surf);border-bottom:1px solid var(--bdr);height:52px;
    padding:0 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;
    box-shadow:0 1px 3px rgba(0,0,0,.05);transition:background .2s}
.hd.edit-mode{background:var(--amber-bg)}
.hd-title{font-size:15px;font-weight:700;letter-spacing:.02em}
.spacer{flex:1}
.sync-row{display:flex;align-items:center;gap:7px}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .3s}
.dot.ok{background:#22c55e}
.dot.saving{background:#f59e0b;animation:blink .6s infinite}
.dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-text{font-size:12px;font-family:var(--mono);color:var(--ink2)}
.pill{font-size:11px;font-family:var(--mono);padding:3px 11px;border-radius:99px;
      background:var(--blue-bg);color:var(--blue);font-weight:500}
.tb{background:var(--surf);border-bottom:1px solid var(--bdr);
    padding:8px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;
    transition:background .2s}
.tb.edit-mode{background:var(--amber-bg);border-color:var(--edit-bdr)}
.btn{font-size:12px;font-family:var(--font);font-weight:500;padding:6px 14px;
     border-radius:var(--r);border:1px solid var(--bdr);background:var(--surf);
     color:var(--ink);cursor:pointer;transition:all .12s;white-space:nowrap;user-select:none}
.btn:hover{background:var(--bg)}
.btn.danger{color:var(--red);background:var(--red-bg);border-color:#f5bdb5}
.btn.edit-on{background:var(--edit-accent);color:#fff;border-color:var(--edit-accent)}
.sep{width:1px;height:20px;background:var(--bdr);flex-shrink:0}
.count{font-size:12px;font-family:var(--mono);background:var(--grn-bg);
       color:var(--grn);padding:3px 11px;border-radius:99px;white-space:nowrap;margin-left:auto}
.map-wrap{flex:1;overflow:auto;padding:20px;display:flex;
          justify-content:flex-start;align-items:flex-start}
.map-scaler{transform-origin:top left;flex-shrink:0}
.map-box{position:relative;width:1410px;height:908px;border-radius:10px;
         box-shadow:0 4px 20px rgba(0,0,0,.1);border:1px solid var(--bdr)}
.map-box.edit-mode{border-color:var(--edit-bdr);box-shadow:0 0 0 3px rgba(217,119,6,.15),0 4px 20px rgba(0,0,0,.1)}
.floor{display:block;width:1410px;height:908px;border-radius:10px;user-select:none;pointer-events:none}
.seat{position:absolute;cursor:pointer;transform-origin:center center}
.seat:hover{z-index:30}
body:not(.editing) .seat:hover svg{filter:drop-shadow(0 0 4px rgba(30,79,194,.5))}
body.editing .seat{cursor:grab}
body.editing .seat:active{cursor:grabbing}
body.editing .seat:hover svg{filter:drop-shadow(0 0 5px rgba(217,119,6,.6))}
body.editing .seat.dragging{z-index:100;opacity:.85}
.rot-btn,.del-btn{display:none;position:absolute;z-index:10;width:20px;height:20px;
         border-radius:50%;color:#fff;font-size:12px;line-height:20px;text-align:center;
         cursor:pointer;border:none;box-shadow:0 1px 4px rgba(0,0,0,.3);user-select:none}
.rot-btn{background:var(--edit-accent);top:-10px;right:-10px}
.del-btn{background:var(--red);top:-10px;left:-10px}
body.editing .seat:hover .rot-btn,body.editing .seat:hover .del-btn{display:block}
.rot-btn:hover{background:#b45309}.del-btn:hover{background:#7f1d1d}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:100;
         backdrop-filter:blur(3px);align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surf);border-radius:14px;padding:28px 28px 24px;width:320px;
       box-shadow:0 20px 50px rgba(0,0,0,.18);border:1px solid var(--bdr);animation:pop .15s ease}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-size:15px;font-weight:700;margin-bottom:3px}
.modal-sub{font-size:11px;font-family:var(--mono);color:var(--ink2);margin-bottom:20px}
.modal label{display:block;font-size:11px;font-weight:600;color:var(--ink2);
             text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.modal input{width:100%;font-size:16px;font-family:var(--font);font-weight:500;
             padding:10px 13px;border:1.5px solid var(--bdr);border-radius:var(--r);
             background:var(--bg);color:var(--ink);outline:none;transition:border .15s;margin-bottom:18px}
.modal input:focus{border-color:var(--blue)}
.modal-acts{display:flex;gap:8px;justify-content:flex-end}
.btn-primary{font-size:13px;font-family:var(--font);font-weight:500;padding:8px 18px;
             border-radius:var(--r);border:none;background:var(--blue);color:#fff;cursor:pointer}
.btn-primary:hover{background:#163da0}
.toasts{position:fixed;bottom:20px;right:20px;z-index:300;
        display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{font-size:13px;padding:10px 16px;border-radius:9px;pointer-events:none;
       animation:tin .2s ease,tout .3s 2.5s ease forwards}
.toast.ok{background:var(--grn-bg);color:var(--grn);border:1px solid #b3dfc5}
.toast.err{background:var(--red-bg);color:var(--red);border:1px solid #f5bdb5}
.toast.info{background:var(--blue-bg);color:var(--blue);border:1px solid #c3d3f7}
@keyframes tin{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes tout{to{opacity:0}}
</style>
</head>
<body>
<header class="hd" id="hd">
  <span class="hd-title">🗺 座席表</span>
  <div class="spacer"></div>
  <div class="sync-row">
    <div class="dot" id="dot"></div>
    <span class="sync-text" id="syncText">読み込み中...</span>
  </div>
  <span class="pill" id="pill">－ / 130</span>
</header>
<div class="tb" id="tb">
  <div id="viewTools" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <button class="btn" onclick="zoomIn()">＋ 拡大</button>
    <button class="btn" onclick="zoomOut()">－ 縮小</button>
    <button class="btn" onclick="zoomFit()">全体表示</button>
    <div class="sep"></div>
    <button class="btn danger" onclick="confirmClear()">🗑 全員クリア</button>
    <div class="sep"></div>
    <button class="btn edit-on" onclick="toggleEdit()">✏️ レイアウト編集</button>
    <div class="sep"></div>
    <button class="btn" onclick="loadFromGAS()">🔄 最新に更新</button>
  </div>
  <div id="editTools" style="display:none;align-items:center;gap:10px;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--amber);background:var(--amber-bg);padding:4px 12px;border-radius:99px;border:1px solid var(--edit-bdr)">✏️ 編集モード</span>
    <div class="sep"></div>
    <button class="btn" onclick="toggleEdit()">👁 閲覧に戻る</button>
    <div class="sep"></div>
    <span style="font-size:12px;color:var(--amber)">ドラッグ＝移動　↻＝回転　×＝削除</span>
  </div>
  <span class="count" id="count">0 / 0 名入力済</span>
</div>

// ── GAS通信: 1件ずつ送受信 ───────────────────────────────
async function gasGet(params) {
  const url = GAS + '?' + new URLSearchParams({...params, t: Date.now()});
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// 全件読み込み
async function loadFromGAS(silent = false) {
  if (!silent) setSync('saving', '読み込み中...');
  try {
    const data = await gasGet({action: 'load'});
    if (data.names) names = data.names;
    renderSeats();
    setSync('ok', '同期済 ' + new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'}));
    if (!silent) toast('✅ 最新データを読み込みました', 'ok');
  } catch(e) {
    setSync('err', '接続エラー');
    if (!silent) toast('読み込みエラー: ' + e.message, 'err');
  }
}

// 名前を1件だけ保存
async function saveSingleName(id, name) {
  setSync('saving', '保存中...');
  try {
    await gasGet({action: 'setName', id, name: encodeURIComponent(name)});
    setSync('ok', '保存済 ' + new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit',second:'2-digit'}));
  } catch(e) {
    setSync('err', '保存エラー');
    toast('保存エラー: ' + e.message, 'err');
  }
}

// 全員クリア
async function clearAllNames() {
  setSync('saving', '保存中...');
  try {
    await gasGet({action: 'clearAll'});
    setSync('ok', '保存済');
  } catch(e) {
    setSync('err', '保存エラー');
  }
}

// 自動更新（編集中・入力中は止める）
function startAutoReload() {
  stopAutoReload();
  autoTimer = setInterval(() => { if (!editMode) loadFromGAS(true); }, 30000);
}
function stopAutoReload() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
}

  if(name){
    const fs=Math.min(13,Math.max(7,Math.round(deskH*0.30)));
    const charsPerLine=Math.max(1,Math.floor((deskW-6)/fs));
    const lines=[];
    for(let i=0;i<name.length;i+=charsPerLine) lines.push(name.slice(i,i+charsPerLine));
    const lineH=fs*1.4, totalH=lines.length*lineH;
    const startY=deskY+deskH/2-totalH/2+fs*0.8, cx=deskX+deskW/2;
    const tspans=lines.map((ln,i)=>`<tspan x="${cx.toFixed(1)}" dy="${i===0?0:lineH.toFixed(1)}">${ln}</tspan>`).join('');
    textEl=`<text x="${cx.toFixed(1)}" y="${startY.toFixed(1)}" text-anchor="middle"
      font-family="'Noto Sans JP',sans-serif" font-size="${fs}" font-weight="700" fill="#152f80"
      style="pointer-events:none">${tspans}</text>`;
  }
  return `<svg width="${vw}" height="${vh}" viewBox="0 0 ${vw} ${vh}"
    xmlns="http://www.w3.org/2000/svg" style="display:block;overflow:visible">
    <rect x="${deskX}" y="${deskY}" width="${deskW}" height="${deskH}"
      rx="3" fill="${deskFill}" stroke="${stroke}" stroke-width="1.5"/>
    <rect x="${chX}" y="${chY}" width="${chW}" height="${chH}"
      rx="${chR}" fill="${chairFill}" stroke="${stroke}" stroke-width="1.2"/>
    ${textEl}</svg>`;
}

// ── 座席描画 ─────────────────────────────────────────────
function renderSeats() {
  const box=document.getElementById('mapBox');
  box.querySelectorAll('.seat').forEach(e=>e.remove());
  let filled=0;
  seats.forEach(seat=>{
    const name=names[seat.id]||'';
    if(name) filled++;
    const rot=seat.rot||0;
    const cx=seat.x+seat.w/2, cy=seat.y+seat.h/2;
    let vw,vh,extraRot;
    if(rot===0){vw=seat.h;vh=seat.w;extraRot=270;}
    else if(rot===90){vw=seat.w;vh=seat.h;extraRot=180;}
    else if(rot===180){vw=seat.h;vh=seat.w;extraRot=90;}
    else{vw=seat.h;vh=seat.w;extraRot=0;}
    const el=document.createElement('div');
    el.className='seat'; el.dataset.id=seat.id;
    el.style.cssText=`left:${Math.round(cx)}px;top:${Math.round(cy)}px;width:${vw}px;height:${vh}px;transform:translate(-50%,-50%) rotate(${extraRot}deg);`;
    el.innerHTML=makeSVG(vw,vh,name);
    const rotBtn=document.createElement('button');
    rotBtn.className='rot-btn';rotBtn.textContent='↻';
    rotBtn.onclick=e=>{e.stopPropagation();rotateSeat(seat.id);};
    el.appendChild(rotBtn);
    const delBtn=document.createElement('button');
    delBtn.className='del-btn';delBtn.textContent='×';
    delBtn.onclick=e=>{e.stopPropagation();deleteSeat(seat.id);};
    el.appendChild(delBtn);
    el.addEventListener('click',()=>{if(!editMode)openModal(seat.id);});
    makeDraggable(el,seat);
    box.appendChild(el);
  });
  document.getElementById('pill').textContent=`${filled} / ${seats.length}`;
  document.getElementById('count').textContent=`${filled} / ${seats.length} 名入力済`;
}

// ── ドラッグ（レイアウトはローカルのみ保存）─────────────
function makeDraggable(el,seat){
  let sx,sy,sx0,sy0,moved=false;
  function down(e){
    if(!editMode)return;
    const p=e.touches?e.touches[0]:e;
    sx=p.clientX;sy=p.clientY;sx0=seat.x;sy0=seat.y;moved=false;
    el.classList.add('dragging');e.preventDefault();
    function move(ev){
      const mp=ev.touches?ev.touches[0]:ev;
      const dx=(mp.clientX-sx)/zoom,dy=(mp.clientY-sy)/zoom;
      if(Math.abs(dx)>2||Math.abs(dy)>2)moved=true;
      if(!moved)return;
      seat.x=Math.round(sx0+dx);seat.y=Math.round(sy0+dy);
      const ncx=seat.x+seat.w/2,ncy=seat.y+seat.h/2;
      el.style.left=Math.round(ncx)+'px';el.style.top=Math.round(ncy)+'px';
    }
    function up(){
      el.classList.remove('dragging');
      document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);
      document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up);
      if(moved) toast('📌 位置を変更しました（GitHubへの反映は管理者が行います）','info');
    }
    document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
    document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);
  }
  el.addEventListener('mousedown',down);
  el.addEventListener('touchstart',down,{passive:false});
}

async function rotateSeat(id){
  const s=seats.find(s=>s.id===id);if(!s)return;
  s.rot=((s.rot||0)+90)%360;
  renderSeats();
  toast('↻ 回転しました（GitHubへの反映は管理者が行います）','info');
}
async function deleteSeat(id){
  if(!confirm('この座席を削除しますか？'))return;
  seats=seats.filter(s=>s.id!==id);delete names[id];
  renderSeats();
  toast('削除しました（GitHubへの反映は管理者が行います）','info');
}

function toggleEdit(){
  editMode=!editMode;
  document.body.classList.toggle('editing',editMode);
  ['hd','tb','mapBox'].forEach(id=>document.getElementById(id).classList.toggle('edit-mode',editMode));
  document.getElementById('viewTools').style.display=editMode?'none':'flex';
  document.getElementById('editTools').style.display=editMode?'flex':'none';
  if(editMode)stopAutoReload(); else startAutoReload();
}

function applyZoom(){document.getElementById('mapScaler').style.transform=`scale(${zoom})`;}
function zoomIn(){zoom=Math.min(zoom+.15,3);applyZoom();}
function zoomOut(){zoom=Math.max(zoom-.15,.3);applyZoom();}
function zoomFit(){
  const w=document.getElementById('mapWrap');
  zoom=Math.min((w.clientWidth-40)/1410,(w.clientHeight-40)/908,1);applyZoom();
}

function openModal(id){
  editId=id;
  document.getElementById('modalSub').textContent=id;
  document.getElementById('nameInput').value=names[id]||'';
  document.getElementById('overlay').classList.add('open');
  stopAutoReload();
  setTimeout(()=>{const i=document.getElementById('nameInput');i.focus();i.select();},60);
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  editId=null;
  if(!editMode)startAutoReload();
}
async function saveName(){
  if(!editId)return;
  const val=document.getElementById('nameInput').value.trim();
  const id=editId;
  if(val) names[id]=val; else delete names[id];
  closeModal();
  renderSeats();
  await saveSingleName(id, val);
  toast(val?`✔ "${val}" を保存しました`:'空席にしました','ok');
}
async function clearSeat(){
  if(!editId)return;
  const id=editId;
  delete names[id];
  closeModal();
  renderSeats();
  await saveSingleName(id, '');
  toast('空席にしました','ok');
}
function onKey(e){if(e.key==='Enter')saveName();if(e.key==='Escape')closeModal();}
async function confirmClear(){
  if(!confirm('全員の名前をクリアします。よろしいですか？'))return;
  names={};renderSeats();
  await clearAllNames();
  toast('全員クリアしました','ok');
}

function setSync(state,text){
  document.getElementById('dot').className='dot '+state;
  document.getElementById('syncText').textContent=text;
}
function toast(msg,type='info'){
  const w=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;
  w.appendChild(t);setTimeout(()=>t.remove(),4000);
}

window.addEventListener('load',()=>{
  renderSeats();
  setTimeout(zoomFit,100);
  loadFromGAS();
  startAutoReload();
});
window.addEventListener('resize',zoomFit);
</script>
